<main class="auth-page">
  <section class="auth-panel" aria-labelledby="auth-title">
    <div class="auth-heading">
      <p>Time Tracking</p>
      <h1 id="auth-title">{{ title() }}</h1>
    </div>

    <div class="mode-switch" role="group" aria-label="Authentication mode">
      <button type="button" [class.active]="mode() === 'login'" (click)="switchMode('login')">Login</button>
      <button type="button" [class.active]="mode() === 'register'" (click)="switchMode('register')">New user</button>
    </div>

    <form [formGroup]="form" (ngSubmit)="submit()">
      <label>
        <span>Username</span>
        <input type="text" formControlName="username" autocomplete="username" />
      </label>

      @if (mode() === 'register') {
        <label>
          <span>Display name</span>
          <input type="text" formControlName="displayName" autocomplete="name" />
        </label>
      }

      <label>
        <span>Password</span>
        <input
          type="password"
          formControlName="password"
          [autocomplete]="mode() === 'login' ? 'current-password' : 'new-password'"
        />
      </label>

      @if (error()) {
        <p class="error">{{ error() }}</p>
      }

      <button class="submit" type="submit" [disabled]="loading()">
        {{ loading() ? 'Please wait...' : submitLabel() }}
      </button>
    </form>
  </section>
</main>
