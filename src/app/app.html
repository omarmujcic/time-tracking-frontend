<main class="shell">
  <section class="panel">
    <p class="eyebrow">Local development stack</p>
    <h1>{{ title() }}</h1>

    @if (status(); as apiStatus) {
      <div class="status-grid" aria-label="Application status">
        <div>
          <span>Backend</span>
          <strong>{{ apiStatus.backend }}</strong>
        </div>
        <div>
          <span>Database</span>
          <strong>{{ apiStatus.database }}</strong>
        </div>
      </div>
    } @else {
      <p class="status-message">{{ error() || 'Checking backend and database...' }}</p>
    }
  </section>

  <router-outlet />
</main>
