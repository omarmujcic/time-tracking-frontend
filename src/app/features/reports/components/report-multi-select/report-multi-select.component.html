<label class="multi-select-field">
  <span>{{ label }}</span>
  <button type="button" class="select-trigger" [class.placeholder]="!selectedValues.length" (click)="toggleOpen()">
    <strong>{{ displayValue }}</strong>
    <mat-icon aria-hidden="true">{{ open() ? 'expand_less' : 'expand_more' }}</mat-icon>
  </button>
  @if (open()) {
    <div class="options-panel">
      @if (createLabel) {
        @if (creating()) {
          <div class="create-option-row">
            <input
              name="createOption"
              [(ngModel)]="createValue"
              [placeholder]="createPlaceholder"
              maxlength="160"
              (click)="$event.stopPropagation()"
              (keydown.enter)="submitCreate(); $event.preventDefault()"
              (keydown.escape)="cancelCreating(); $event.preventDefault()"
            />
            <button type="button" (click)="submitCreate()">
              <mat-icon aria-hidden="true">check</mat-icon>
            </button>
            <button type="button" class="secondary" (click)="cancelCreating()">
              <mat-icon aria-hidden="true">close</mat-icon>
            </button>
          </div>
        } @else {
          <button type="button" class="option-row create-option" (click)="startCreating($event)">
            <mat-icon aria-hidden="true">add</mat-icon>
            <span>{{ createLabel }}</span>
          </button>
        }
      }
      @for (option of sortedOptions; track option.value) {
        <button
          type="button"
          class="option-row"
          [class.selected]="isSelected(option.value)"
          (click)="toggleValue(option.value)"
        >
          <mat-icon aria-hidden="true">{{ isSelected(option.value) ? 'check' : '' }}</mat-icon>
          <span>{{ option.label }}</span>
        </button>
      } @empty {
        <p>No options</p>
      }
    </div>
  }
</label>
